<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo de Construcción de Software - LOS BENDITOS</title>
    <style>
        /* Estilos muy básicos para la V1 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px 0;
        }
        h1 { margin: 0; }
        
        .container {
            width: 80%;
            margin: auto;
            padding: 20px 0;
        }

        /* Sección del equipo */
        .grid-equipo {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .integrante {
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            width: 200px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .integrante img {
            max-width: 100%;
            height: auto;
            border-radius: 50%; /* Imagenes redondas */
            border: 3px solid #eee;
        }
        .integrante-nombre {
            font-weight: bold;
            margin-top: 10px;
            color: #555;
        }

        footer {
            margin-top: 40px;
            background-color: #ddd;
            padding: 20px;
            color: #333;
            font-size: 0.9em;
        }
        footer p { margin: 5px 0; }
    </style>
</head>
<body>

    <header>
        <h1>LOS BENDITOS</h1>
    </header>

    <div class="container">
        <h2>Nuestro Equipo de Desarrollo</h2>
        
        <div class="grid-equipo">
            
            <div class="integrante">
                <img src="https://via.placeholder.com/150/007bff/ffffff?text=FOTO+1" alt="Foto de Integrante 1">
                <div class="integrante-nombre">[Nombre Completo Integrante 1]</div>
            </div>

            <div class="integrante">
                <img src="https://via.placeholder.com/150/28a745/ffffff?text=FOTO+2" alt="Foto de Integrante 2">
                <div class="integrante-nombre">[Nombre Completo Integrante 2]</div>
            </div>

            <div class="integrante">
                <img src="https://via.placeholder.com/150/dc3545/ffffff?text=FOTO+3" alt="Foto de Integrante 3">
                <div class="integrante-nombre">[Nombre Completo Integrante 3]</div>
            </div>

            <div class="integrante">
                <img src="https://via.placeholder.com/150/ffc107/333333?text=FOTO+4" alt="Foto de Integrante 4">
                <div class="integrante-nombre">[Nombre Completo Integrante 4]</div>
            </div>

        </div>
    </div>

    <footer>
        <p>Grupo de Ingeniería de Sistemas</p>
        <p>Curso: Construcción de Software</p>
    </footer>

</body>
</html>
